version: "3.9"

services:
  app:
    build: .
    image: invoice-extractor-api:latest
    container_name: invoice-extractor-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Coolify and other reverse proxies use this health check to know when
    # the container is ready to receive traffic.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
